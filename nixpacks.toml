[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "nss",
  "nspr",
  "atk",
  "cups",
  "libdrm",
  "dbus",
  "libxkbcommon",
  "pango",
  "cairo",
  "libxdamage",
  "libxfixes",
  "libxrandr",
  "gbm",
